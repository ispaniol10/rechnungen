/* ============================================================

   CREATE TABLE IF NOT EXISTS rechnungen (
     id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
     year INTEGER NOT NULL,
     name TEXT NOT NULL,
     re_nr TEXT,
     betrag DECIMAL(10,2),
     re_datum DATE,
     eingereicht DATE,
     bezahlt DATE,
     person TEXT,
     sort_idx INTEGER DEFAULT 0,
     created_at TIMESTAMPTZ DEFAULT NOW()
   );
   ALTER TABLE rechnungen ENABLE ROW LEVEL SECURITY;
   CREATE POLICY "allow_all" ON rechnungen FOR ALL TO anon USING (true) WITH CHECK (true);

============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0d2137;
  --navy-mid: #163552;
  --navy-light: #1e4976;
  --teal: #00b4a6;
  --teal-dark: #008f84;
  --amber: #f5a623;
  --red: #e05252;
  --green: #27ae60;
  --green-light: #d4f5e0;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #dde4ee;
  --text: #1a2332;
  --text-muted: #6b7e99;
  --shadow: 0 1px 4px rgba(13,33,55,0.1), 0 4px 16px rgba(13,33,55,0.06);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ---- HEADER ---- */
header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  color: white;
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  height: 64px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.header-title { display: flex; align-items: center; gap: 12px; }
.header-icon {
  width: 36px; height: 36px;
  background: var(--teal);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
header p { font-size: 0.78rem; opacity: 0.65; font-weight: 300; }
.header-badge {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.8);
}

/* ---- TABS ---- */
.tabs-bar {
  background: var(--navy-mid);
  padding: 0 24px;
  display: flex;
  gap: 2px;
  align-items: flex-end;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 22px 10px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  border-radius: 8px 8px 0 0;
  transition: all 0.18s;
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.tab-btn:hover { background: rgba(255,255,255,0.16); color: white; }
.tab-btn.active {
  background: var(--bg);
  color: var(--navy);
  font-weight: 600;
}
.tab-add-btn {
  padding: 8px 14px;
  background: transparent;
  border: 1.5px dashed rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  border-radius: 8px 8px 0 0;
  transition: all 0.18s;
  margin-bottom: 0;
  align-self: center;
  margin-left: 6px;
}
.tab-add-btn:hover { border-color: var(--teal); color: var(--teal); }

/* ---- MAIN CONTENT ---- */
.main { padding: 24px 28px; }

/* ---- SETUP WARNING ---- */
.setup-card {
  background: var(--card);
  border: 1.5px solid #f0c060;
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 20px;
  display: none;
}
.setup-card h3 { color: #b07a00; margin-bottom: 8px; font-size: 1rem; }
.setup-card p { color: #7a5500; font-size: 0.88rem; line-height: 1.6; }
.setup-card code {
  background: #fff8e8;
  border: 1px solid #f0c060;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 0.82rem;
  color: #7a3300;
}

/* ---- TOOLBAR ---- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.toolbar-left { display: flex; gap: 8px; align-items: center; flex: 1; flex-wrap: wrap; }

/* ---- BUTTONS ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: var(--navy-light); }
.btn-teal { background: var(--teal); color: white; }
.btn-teal:hover { background: var(--teal-dark); }
.btn-outline {
  background: white;
  color: var(--navy);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--navy); background: #f0f4f8; }
.btn-danger { background: var(--red); color: white; padding: 5px 10px; font-size: 0.8rem; }
.btn-danger:hover { background: #c04040; }
.btn-sm { padding: 5px 10px; font-size: 0.82rem; }
.btn-icon {
  width: 28px; height: 28px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.95rem;
  transition: all 0.15s;
}
.btn-icon:hover { background: #ffeeee; color: var(--red); }

/* ---- STATS BAR ---- */
.stats-bar {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 18px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-left: 3px solid transparent;
  flex: 1;
  min-width: 130px;
}
.stat-card.total { border-color: var(--navy); }
.stat-card.eingereicht-stat { border-color: var(--teal); }
.stat-card.bezahlt-stat { border-color: var(--green); }
.stat-card.offen-stat { border-color: var(--amber); }
.stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 500; }
.stat-value { font-size: 1.2rem; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

/* ---- TABLE ---- */
.table-card {
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; min-width: 820px; }
thead { background: var(--navy); }
thead th {
  padding: 11px 12px;
  text-align: left;
  color: rgba(255,255,255,0.85);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
}
thead th:first-child { padding-left: 18px; }
thead th:last-child { text-align: center; }
thead th.center { text-align: center; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f8fc; }
td { padding: 9px 12px; vertical-align: middle; }
td:first-child { padding-left: 18px; }

.td-nr { color: var(--text-muted); font-size: 0.82rem; font-weight: 500; min-width: 32px; }
.td-name { font-weight: 500; }
.td-renr {
  font-family: 'Courier New', monospace;
  font-size: 0.78rem;
  color: var(--text-muted);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.td-betrag {
  text-align: right;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--navy);
  white-space: nowrap;
}
.td-datum { color: var(--text-muted); font-size: 0.83rem; white-space: nowrap; }
.td-person { text-align: center; }
.person-badge {
  background: #e8f0ff;
  color: #3355bb;
  border-radius: 12px;
  padding: 2px 9px;
  font-size: 0.75rem;
  font-weight: 500;
}

/* ---- STATUS CELLS ---- */
.td-status { text-align: center; padding: 6px 8px; }
.status-toggle {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.status-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2px solid #cdd8e8;
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.18s;
  color: #cdd8e8;
}
.status-btn:hover { border-color: var(--teal); color: var(--teal); transform: scale(1.1); }
.status-btn.checked {
  background: var(--green);
  border-color: var(--green);
  color: white;
}
.status-btn.checked:hover { background: #1d9450; border-color: #1d9450; }
.status-date-text {
  font-size: 0.68rem;
  color: var(--text-muted);
  white-space: nowrap;
  cursor: pointer;
  padding: 1px 4px;
  border-radius: 3px;
  transition: background 0.12s;
}
.status-date-text:hover { background: var(--border); }
.status-date-input {
  font-size: 0.7rem;
  border: 1px solid var(--teal);
  border-radius: 4px;
  padding: 2px 4px;
  width: 110px;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  outline: none;
}

/* ---- EMPTY STATE ---- */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.95rem; }

/* ---- LOADING ---- */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,33,55,0.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.loading-overlay.show { display: flex; }
.loading-box {
  background: white;
  border-radius: 12px;
  padding: 28px 40px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box p { color: var(--text-muted); font-size: 0.9rem; }

/* ---- MODALS ---- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,33,55,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 14px;
  padding: 32px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: 22px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1/-1; }
.form-group label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.form-group input, .form-group select {
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  background: white;
}
.form-group input:focus, .form-group select:focus { border-color: var(--teal); }
.modal-footer {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* ---- TOAST ---- */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--navy);
  color: white;
  padding: 11px 18px;
  border-radius: 8px;
  font-size: 0.88rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  animation: toastIn 0.25s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
@keyframes toastIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ---- RESPONSIVE ---- */
@media (max-width: 600px) {
  .main { padding: 16px; }
  header { padding: 0 16px; }
  .tabs-bar { padding: 0 12px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// ======================================================
// BASEROW ADAPTER
// ======================================================

async function api(url = '', method = 'GET', body = null) {

  const options = {
    method,
    headers: {
      'Authorization': `Token ${BASEROW_TOKEN}`,
      'Content-Type': 'application/json'
    }
  };

  if (body) {
    options.body = JSON.stringify(body);
  }

  const res = await fetch(url, options);

  if (!res.ok) {
    let errText = ''; try { errText = await res.text(); } catch {}
    console.error(`Baserow ${method} ${url} → ${res.status}`, errText);
    throw new Error(`HTTP ${res.status}: ${errText || res.statusText}`);
  }

  if (res.status === 204) return true;

  return await res.json();
}

async function dbLoadAll() {
  let allResults = [];
  let url = `${BASEROW_URL}?user_field_names=true&page_size=200`;
  while (url) {
    const data = await api(url);
    allResults = allResults.concat(data.results);
    // Baserow gibt manchmal http:// statt https:// zurück → Mixed Content Fix
    url = data.next ? data.next.replace('http://', 'https://') : null;
  }
  return allResults
    .filter(r => r.year != null && r.year !== '')
    .map(r => ({
    id: r.id,
    year: r.year,
    name: r.name,
    re_nr: r.re_nr,
    betrag: r.betrag,
    re_datum: r.re_datum,
    eingereicht: r.eingereicht,
    bezahlt: r.bezahlt,
    person: r.person,
    sort_idx: r.sort_idx
  }));
}

async function dbInsert(row) {

  const saved = await api(
    `${BASEROW_URL}?user_field_names=true`,
    'POST',
    row
  );

  return {
    ...row,
    id: saved.id
  };
}

async function dbUpdate(id, fields) {

  await api(
    `${BASEROW_URL}${id}/?user_field_names=true`,
    'PATCH',
    fields
  );

  return true;
}

async function dbDelete(id) {

  await api(
    `${BASEROW_URL}${id}/`,
    'DELETE'
  );
}

async function dbInsertMany(rows) {
  const CHUNK = 20;
  for (let i = 0; i < rows.length; i += CHUNK) {
    const chunk = rows.slice(i, i + CHUNK);
    await api(
      `${BASEROW_URL}batch/?user_field_names=true`,
      'POST',
      { items: chunk }
    );
    document.getElementById('loading-text').textContent =
      `Importiere… ${Math.min(i + CHUNK, rows.length)} / ${rows.length}`;
    await new Promise(r => setTimeout(r, 800));
  }
}

// APP STATE
// ======================================================
let allRows = [];
let years = [];
let activeYear = null;
let editingDateCtx = null; // {id, field}
let addingForYear = null;

// ======================================================
// UTILS
// ======================================================
function fmtDate(d) {
  if (!d) return '';
  try {
    const [y, m, day] = d.substring(0, 10).split('-');
    return `${day}.${m}.${y}`;
  } catch { return d; }
}

function fmtEuro(v) {
  if (v == null) return '–';
  return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v);
}

function today() {
  return new Date().toISOString().substring(0, 10);
}

function rowsForYear(y) {
  return allRows.filter(r => r.year === y).sort((a, b) => (a.sort_idx || 0) - (b.sort_idx || 0));
}

function getYears() {
  const ys = [...new Set(allRows.map(r => r.year))].sort();
  return ys.length ? ys : [new Date().getFullYear()];
}

// ======================================================
// TOAST
// ======================================================
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ======================================================
// LOADING
// ======================================================
function showLoading(msg = 'Bitte warten…') {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

// ======================================================
// RENDER
// ======================================================
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  const addBtn = bar.querySelector('.tab-add-btn');
  bar.querySelectorAll('.tab-btn').forEach(b => b.remove());
  years.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (y === activeYear ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => switchYear(y);
    bar.insertBefore(btn, addBtn);
  });
}

function renderPanels() {
  const container = document.getElementById('year-panels');
  container.innerHTML = '';
  years.forEach(y => {
    const rows = rowsForYear(y);
    const total = rows.reduce((s, r) => s + (parseFloat(r.betrag) || 0), 0);
    const eingereichtCount = rows.filter(r => r.eingereicht).length;
    const bezahltCount = rows.filter(r => r.bezahlt).length;
    const offenCount = rows.filter(r => !r.bezahlt).length;

    const panel = document.createElement('div');
    panel.id = `panel-${y}`;
    panel.style.display = y === activeYear ? 'block' : 'none';

    panel.innerHTML = `
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="btn btn-teal" onclick="openInvoiceModal(${y})">＋ Neue Rechnung</button>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-card total">
          <span class="stat-label">Gesamtbetrag</span>
          <span class="stat-value">${fmtEuro(total)}</span>
        </div>
        <div class="stat-card eingereicht-stat">
          <span class="stat-label">Eingereicht</span>
          <span class="stat-value">${eingereichtCount} / ${rows.length}</span>
        </div>
        <div class="stat-card bezahlt-stat">
          <span class="stat-label">Bezahlt</span>
          <span class="stat-value">${bezahltCount} / ${rows.length}</span>
        </div>
        <div class="stat-card offen-stat">
          <span class="stat-label">Noch offen</span>
          <span class="stat-value">${offenCount}</span>
        </div>
      </div>

      <div class="table-card">
        ${rows.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>Noch keine Rechnungen für ${y}.<br>Klicke auf „＋ Neue Rechnung".</p>
          </div>
        ` : `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name / Aussteller</th>
              <th>Re-Nr.</th>
              <th style="text-align:right">Betrag</th>
              <th>Re-Datum</th>
              <th class="center">Für</th>
              <th class="center">Eingereicht</th>
              <th class="center">Bezahlt</th>
              <th class="center">✕</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r, i) => renderRow(r, i + 1)).join('')}
          </tbody>
        </table>
        `}
      </div>
    `;
    container.appendChild(panel);
  });
}

function renderRow(r, nr) {
  const eDate = r.eingereicht ? r.eingereicht.substring(0, 10) : null;
  const bDate = r.bezahlt ? r.bezahlt.substring(0, 10) : null;

  return `
    <tr id="row-${r.id}">
      <td class="td-nr">${nr}</td>
      <td class="td-name">${esc(r.name) }</td>
      <td class="td-renr" title="${esc(r.re_nr || '')}">${esc(r.re_nr || '–')}</td>
      <td class="td-betrag">${fmtEuro(r.betrag)}</td>
      <td class="td-datum">${fmtDate(r.re_datum)}</td>
      <td class="td-person">
        ${r.person ? `<span class="person-badge">${esc(r.person)}</span>` : ''}
      </td>
      <td class="td-status">
        <div class="status-toggle">
          <button class="status-btn ${eDate ? 'checked' : ''}"
            onclick="toggleStatus('${r.id}', 'eingereicht', ${eDate ? `'${eDate}'` : 'null'})"
            title="${eDate ? 'Eingereicht: ' + fmtDate(eDate) + ' (Klick: löschen)' : 'Klick: als eingereicht markieren'}">
            ✓
          </button>
          <span class="status-date-text" onclick="openDateModal('${r.id}', 'eingereicht', ${eDate ? `'${eDate}'` : 'null'})">
            ${eDate ? fmtDate(eDate) : '–'}
          </span>
        </div>
      </td>
      <td class="td-status">
        <div class="status-toggle">
          <button class="status-btn ${bDate ? 'checked' : ''}"
            onclick="toggleStatus('${r.id}', 'bezahlt', ${bDate ? `'${bDate}'` : 'null'})"
            title="${bDate ? 'Bezahlt: ' + fmtDate(bDate) + ' (Klick: löschen)' : 'Klick: als bezahlt markieren'}">
            ✓
          </button>
          <span class="status-date-text" onclick="openDateModal('${r.id}', 'bezahlt', ${bDate ? `'${bDate}'` : 'null'})">
            ${bDate ? fmtDate(bDate) : '–'}
          </span>
        </div>
      </td>
      <td style="text-align:center">
        <button class="btn-icon" onclick="deleteRow('${r.id}', '${esc(r.name)}')" title="Löschen">🗑</button>
      </td>
    </tr>
  `;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  years = getYears();
  if (!activeYear || !years.includes(activeYear)) activeYear = years[years.length - 1];
  renderTabs();
  renderPanels();
}

function switchYear(y) {
  activeYear = y;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === y));
  document.querySelectorAll('[id^="panel-"]').forEach(p => p.style.display = 'none');
  const panel = document.getElementById(`panel-${y}`);
  if (panel) panel.style.display = 'block';
}

// ======================================================
// TOGGLE STATUS (single click = set today or clear)
// ======================================================
async function toggleStatus(id, field, currentDate) {
  const row = allRows.find(r => r.id === id);
  if (!row) return;
  let newDate;
  if (currentDate) {
    newDate = null; // clear
  } else {
    newDate = today(); // set today
  }
  try {
    const updated = await dbUpdate(id, { [field]: newDate });
    row[field] = newDate;
    render();
    toast(newDate ? `✓ ${field === 'eingereicht' ? 'Eingereicht' : 'Bezahlt'} gesetzt (${fmtDate(newDate)})` : 'Datum gelöscht', newDate ? 'success' : '');
  } catch(e) {
    toast('Fehler: ' + e.message, 'error');
  }
}

// ======================================================
// DATE MODAL
// ======================================================
function openDateModal(id, field, currentDate) {
  editingDateCtx = { id, field };
  document.getElementById('modal-date-title').textContent =
    field === 'eingereicht' ? 'Eingereicht-Datum bearbeiten' : 'Bezahlt-Datum bearbeiten';
  document.getElementById('f-date-value').value = currentDate || today();
  document.getElementById('modal-date').classList.add('open');
}

function closeDateModal() {
  document.getElementById('modal-date').classList.remove('open');
  editingDateCtx = null;
}

async function applyDate() {
  const val = document.getElementById('f-date-value').value;
  if (!val || !editingDateCtx) return;
  const { id, field } = editingDateCtx;
  try {
    await dbUpdate(id, { [field]: val });
    const row = allRows.find(r => r.id === id);
    if (row) row[field] = val;
    closeDateModal();
    render();
    toast('Datum gespeichert', 'success');
  } catch(e) {
    toast('Fehler: ' + e.message, 'error');
  }
}

async function clearDate() {
  if (!editingDateCtx) return;
  const { id, field } = editingDateCtx;
  try {
    await dbUpdate(id, { [field]: null });
    const row = allRows.find(r => r.id === id);
    if (row) row[field] = null;
    closeDateModal();
    render();
    toast('Datum gelöscht');
  } catch(e) {
    toast('Fehler: ' + e.message, 'error');
  }
}

// ======================================================
// DELETE
// ======================================================
async function deleteRow(id, name) {
  if (!confirm(`Rechnung „${name}" wirklich löschen?`)) return;
  try {
    await dbDelete(id);
    allRows = allRows.filter(r => r.id !== id);
    render();
    toast('Rechnung gelöscht');
  } catch(e) {
    toast('Fehler: ' + e.message, 'error');
  }
}

// ======================================================
// ADD INVOICE MODAL
// ======================================================
function openInvoiceModal(year) {
  addingForYear = year;
  ['f-name','f-renr','f-betrag','f-redat','f-person','f-eingereicht','f-bezahlt']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-invoice').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeInvoiceModal() {
  document.getElementById('modal-invoice').classList.remove('open');
}

async function saveInvoice() {
  const name = document.getElementById('f-name').value.trim();
  const betrag = parseFloat(document.getElementById('f-betrag').value);
  if (!name) { toast('Bitte Name angeben', 'error'); return; }

  const maxIdx = Math.max(0, ...rowsForYear(addingForYear).map(r => r.sort_idx || 0));
  const row = {
    year: addingForYear,
    name,
    re_nr: document.getElementById('f-renr').value.trim() || null,
    betrag: isNaN(betrag) ? null : betrag,
    re_datum: document.getElementById('f-redat').value || null,
    person: document.getElementById('f-person').value.trim() || null,
    eingereicht: document.getElementById('f-eingereicht').value || null,
    bezahlt: document.getElementById('f-bezahlt').value || null,
    sort_idx: maxIdx + 1,
  };

  showLoading('Rechnung wird gespeichert…');
  try {
    const saved = await dbInsert(row);
    allRows.push(saved);
    closeInvoiceModal();
    render();
    toast('✓ Rechnung gespeichert', 'success');
  } catch(e) {
    toast('Fehler: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ======================================================
// YEAR MODAL
// ======================================================
function openYearModal() {
  const next = (getYears()[getYears().length - 1] || new Date().getFullYear()) + 1;
  document.getElementById('f-year').value = next;
  document.getElementById('modal-year').classList.add('open');
  document.getElementById('f-year').focus();
}

function closeYearModal() {
  document.getElementById('modal-year').classList.remove('open');
}

function createYear() {
  const y = parseInt(document.getElementById('f-year').value);
  if (!y || y < 2000 || y > 2099) { toast('Ungültiges Jahr', 'error'); return; }
  if (years.includes(y)) { toast(`Jahr ${y} existiert bereits`); closeYearModal(); return; }
  // Create a placeholder row to ensure the year tab appears
  // (the year is tracked via allRows; if empty, we mark it with a sentinel)
  // Actually: we just add to the known years list and render
  allRows.push({ id: crypto.randomUUID(), year: y, _empty: true });
  closeYearModal();
  activeYear = y;
  render();
  switchYear(y);
  toast(`Jahr ${y} angelegt`, 'success');
}

// ======================================================
// IMPORT MODAL
// ======================================================
function closeImportModal() {
  document.getElementById('modal-import').classList.remove('open');
}

async function runImport() {
  closeImportModal();
  showLoading('Importiere Daten…');
  try {
    await dbInsertMany(SEED);
    allRows = await dbLoadAll();
    render();
    toast(`✓ ${SEED.length} Rechnungen importiert`, 'success');
  } catch(e) {
    toast('Import-Fehler: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ======================================================
// KEYBOARD SHORTCUTS
// ======================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
    editingDateCtx = null;
  }
  if (e.key === 'Enter' && document.getElementById('modal-invoice').classList.contains('open')) {
    saveInvoice();
  }
  if (e.key === 'Enter' && document.getElementById('modal-year').classList.contains('open')) {
    createYear();
  }
  if (e.key === 'Enter' && document.getElementById('modal-date').classList.contains('open')) {
    applyDate();
  }
});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      editingDateCtx = null;
    }
  });
});

// ======================================================
// INIT
// ======================================================
async function init() {
  const syncEl = document.getElementById('sync-status');
if (syncEl) syncEl.textContent = '☁ Baserow';
  const setupCard=document.getElementById('setup-card'); if(setupCard) setupCard.style.display='block';

  showLoading('Daten werden geladen…');

  try {
    allRows = await dbLoadAll();

    if (allRows.length === 0) {
      hideLoading();
      document.getElementById('modal-import').classList.add('open');
      return;
    }

    render();
  } catch(e) {
    toast('Ladefehler: ' + e.message, 'error');
    allRows = SEED.map(r => ({ ...r, id: crypto.randomUUID(), created_at: new Date().toISOString() }));
    render();
  } finally {
    hideLoading();
  }
}

init();
</script>
</body>
</html>
